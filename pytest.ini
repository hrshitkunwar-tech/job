[pytest]
# Unit tests are listed before tests/e2e so pytest-asyncio's event loop
# is set up before playwright's sync API creates its own event loop.
# This prevents "Runner.run() cannot be called from a running event loop"
# when async unit tests run after playwright browser tests.
testpaths =
    tests/test_applications_status.py
    tests/test_apply_url_resolver.py
    tests/test_autonomous_workflow.py
    tests/test_blocker_intake.py
    tests/test_jobs_filters.py
    tests/test_scraper_parsing.py
    tests/test_search_orchestration.py
    tests/test_services.py
    tests/e2e
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
markers =
    e2e: End-to-end tests using Playwright
    slow: Tests that take longer to run
